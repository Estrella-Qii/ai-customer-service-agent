<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 智能客服 Agent 控制台</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
              <path d="M12 2a4 4 0 0 0-4 4v1H7a3 3 0 0 0-3 3v6a4 4 0 0 0 4 4h8a4 4 0 0 0 4-4v-6a3 3 0 0 0-3-3h-1V6a4 4 0 0 0-4-4Z" />
              <path d="M9 14h.01M15 14h.01M9 18h6" />
            </svg>
          </div>
          <div>
            <h1>智能客服 Agent</h1>
            <p>RAG 知识库工作台</p>
          </div>
        </div>

        <section class="section">
          <div class="section-header">会话管理</div>
          <label for="sessionIdInput">Session ID</label>
          <input type="text" id="sessionIdInput" class="input-text" placeholder="输入或生成 Session ID" />
          <div class="button-group">
            <button class="btn btn-secondary" id="newSessionBtn" type="button">生成新 ID</button>
            <button class="btn btn-secondary" id="loadHistoryBtn" type="button">加载历史</button>
          </div>
          <button class="btn btn-danger btn-full" id="clearHistoryBtn" type="button">清空当前会话</button>
          <p id="memoryStatus" class="status-message">同一个 Session ID 会保留上下文。</p>
        </section>

        <section class="section">
          <div class="section-header">知识库管理</div>
          <div class="file-upload-box">
            <input type="file" id="fileInput" accept=".txt,.md,.pdf" class="file-input" />
            <label for="fileInput" class="file-label">
              <span id="fileNameDisplay">点击选择文档</span>
              <span class="file-hint">支持 .txt / .md / .pdf</span>
            </label>
          </div>
          <button class="btn btn-primary btn-full" id="uploadBtn" type="button">上传至知识库</button>
          <div id="uploadStatus" class="status-message"></div>
        </section>

        <section class="section">
          <div class="section-header">检索设置</div>
          <label for="topKSelect">返回片段数</label>
          <select id="topKSelect" class="input-text">
            <option value="3">Top 3</option>
            <option value="4" selected>Top 4</option>
            <option value="6">Top 6</option>
            <option value="8">Top 8</option>
          </select>
        </section>

        <div class="sidebar-footer">
          <a href="/docs" target="_blank" class="docs-link">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <path d="M14 2v6h6M8 13h8M8 17h8M8 9h2" />
            </svg>
            API 接口文档
          </a>
        </div>
      </aside>

      <main class="chat-container">
        <header class="chat-header">
          <div>
            <h2>当前对话</h2>
            <p>上传知识库文档后，客服会基于检索结果回答并展示引用来源。</p>
          </div>
          <span class="status-indicator">系统就绪</span>
        </header>

        <div class="chat-history" id="chatHistory">
          <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" width="54" height="54" stroke="currentColor" stroke-width="1.5" fill="none">
              <path d="M21 12a8.5 8.5 0 0 1-12.4 7.6L3 21l1.4-5.3A8.5 8.5 0 1 1 21 12Z" />
              <path d="M8 12h.01M12 12h.01M16 12h.01" />
            </svg>
            <h3>开始一次客服问答</h3>
            <p>可以先上传示例知识库，再询问退款、物流或会员相关问题。</p>
          </div>
        </div>

        <form class="chat-input-area" id="chatForm">
          <div class="input-wrapper">
            <textarea id="questionInput" placeholder="输入问题，Enter 发送，Shift + Enter 换行" rows="1"></textarea>
            <button id="sendBtn" class="btn btn-primary btn-icon" type="submit" aria-label="发送">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
                <path d="m22 2-7 20-4-9-9-4 20-7Z" />
                <path d="M22 2 11 13" />
              </svg>
            </button>
          </div>
        </form>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
